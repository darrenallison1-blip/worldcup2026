<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFA World Cup 2026 — Live Dashboard</title>
<style>
  :root {
    --bg: #ffffff;
    --bg2: #f5f5f5;
    --bg3: #eeeeee;
    --border: #e0e0e0;
    --border2: #cccccc;
    --text: #111111;
    --text2: #555555;
    --text3: #888888;
    --green-bg: #eaf3de;
    --green-text: #3b6d11;
    --yellow-bg: #fff8dc;
    --yellow-text: #7a5c00;
    --blue-bg: #e8f0fe;
    --blue-text: #1a56db;
    --radius: 8px;
    --radius-sm: 5px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a1a;
      --bg2: #242424;
      --bg3: #2e2e2e;
      --border: #333333;
      --border2: #444444;
      --text: #f0f0f0;
      --text2: #aaaaaa;
      --text3: #666666;
      --green-bg: #1a2e0a;
      --green-text: #7ec850;
      --yellow-bg: #2a2000;
      --yellow-text: #d4a017;
      --blue-bg: #0d1f3c;
      --blue-text: #7aadff;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); max-width: 1400px; margin: 0 auto; padding: 0 1rem 2rem; }

  /* HEADER */
  .hdr { display: flex; align-items: center; justify-content: space-between; padding: 1rem 0 0.75rem; border-bottom: 1px solid var(--border); margin-bottom: 1rem; flex-wrap: wrap; gap: 8px; }
  .hdr-left { display: flex; align-items: center; gap: 10px; }
  .hdr h1 { font-size: 18px; font-weight: 600; }
  .badge { font-size: 11px; padding: 3px 10px; border-radius: 999px; font-weight: 500; }
  .badge-live { background: var(--green-bg); color: var(--green-text); }
  .badge-loading { background: var(--blue-bg); color: var(--blue-text); }
  .badge-err { background: #fee; color: #c00; }
  .live-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: #639922; margin-right: 5px; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  .last-updated { font-size: 11px; color: var(--text3); }

  /* TABS */
  .tabs { display: flex; gap: 2px; margin-bottom: 1rem; border-bottom: 1px solid var(--border); }
  .tab { padding: 7px 16px; font-size: 13px; cursor: pointer; border: none; background: none; color: var(--text2); border-bottom: 2px solid transparent; margin-bottom: -1px; font-weight: 500; transition: color .15s; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--text); border-bottom-color: var(--text); }
  .section { display: none; }
  .section.active { display: block; }

  /* GROUPS */
  .groups-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 10px; }
  .gcard { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 12px; }
  .gcard h3 { font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
  .pill { font-size: 10px; padding: 1px 7px; border-radius: 999px; font-weight: 500; }
  .pill-blue { background: var(--blue-bg); color: var(--blue-text); }
  .gtable { width: 100%; border-collapse: collapse; font-size: 12px; }
  .gtable th { color: var(--text3); font-weight: 400; text-align: right; padding: 2px 4px 5px; font-size: 11px; }
  .gtable th:first-child, .gtable td:first-child { text-align: left; }
  .gtable td { padding: 4px 4px; color: var(--text); text-align: right; border-top: 1px solid var(--border); }
  .gtable tr.adv td { background: var(--green-bg); color: var(--green-text); }
  .gtable tr.maybe td { background: var(--yellow-bg); color: var(--yellow-text); }
  .pts { font-weight: 600; }
  .team-cell { display: flex; align-items: center; gap: 6px; }
  .flag-img { width: 18px; height: 13px; object-fit: cover; border-radius: 2px; flex-shrink: 0; }

  /* LEGEND */
  .legend { display: flex; gap: 16px; margin-bottom: 10px; font-size: 11px; flex-wrap: wrap; }
  .leg-item { display: flex; align-items: center; gap: 5px; color: var(--text2); }
  .leg-sq { width: 10px; height: 10px; border-radius: 2px; }

  /* NOTE */
  .note { font-size: 11px; color: var(--text3); margin-top: 10px; padding: 7px 10px; background: var(--bg2); border-radius: var(--radius-sm); line-height: 1.5; }

  /* BRACKET */
  .bwrap { overflow-x: auto; padding-bottom: 8px; }
  .bracket-inner { display: flex; align-items: stretch; min-width: 1080px; }
  .rcol { display: flex; flex-direction: column; min-width: 150px; flex-shrink: 0; }
  .rcol-rev { flex-direction: row-reverse; }
  .rhdr { font-size: 10px; font-weight: 600; color: var(--text2); text-align: center; padding-bottom: 5px; border-bottom: 1px solid var(--border); margin-bottom: 5px; }
  .rbody { display: flex; flex-direction: column; flex: 1; justify-content: space-around; gap: 2px; }
  .match-slot { display: flex; flex-direction: column; margin: 2px 0; }
  .match-date { font-size: 9px; color: var(--text3); text-align: center; margin-bottom: 2px; }
  .team-row { display: flex; align-items: center; gap: 3px; padding: 3px 5px; background: var(--bg); border: 1px solid var(--border); white-space: nowrap; overflow: hidden; }
  .team-row:first-of-type { border-radius: var(--radius-sm) var(--radius-sm) 0 0; border-bottom: none; }
  .team-row:last-of-type { border-radius: 0 0 var(--radius-sm) var(--radius-sm); }
  .team-row.dimmed { color: var(--text3); }
  .bflag { font-size: 11px; flex-shrink: 0; }
  .bname { font-size: 10px; overflow: hidden; text-overflow: ellipsis; flex: 1; min-width: 0; }
  .bseed { font-size: 8px; color: var(--text3); flex-shrink: 0; margin-left: 2px; white-space: nowrap; }
  .conn { min-width: 18px; flex-shrink: 0; display: flex; flex-direction: column; padding-top: 26px; }
  .conn-seg { flex: 1; min-height: 30px; }
  .fin-in { min-width: 14px; flex-shrink: 0; display: flex; flex-direction: column; padding-top: 26px; }
  .fin-in-seg { flex: 1; border-right: 1.5px solid var(--border2); border-bottom: 1.5px solid var(--border2); border-radius: 0 0 4px 0; min-height: 30px; }
  .fin-out { min-width: 14px; flex-shrink: 0; display: flex; flex-direction: column; padding-top: 26px; }
  .fin-out-seg { flex: 1; border-left: 1.5px solid var(--border2); border-bottom: 1.5px solid var(--border2); border-radius: 0 0 0 4px; min-height: 30px; }
  .final-col { display: flex; flex-direction: column; align-items: center; justify-content: center; min-width: 130px; flex-shrink: 0; padding: 0 4px; }
  .trophy { font-size: 26px; text-align: center; margin: 6px 0; }
  .final-venue { font-size: 9px; color: var(--text3); text-align: center; margin-top: 4px; }

  /* THIRDS TABLE */
  .t3table { width: 100%; border-collapse: collapse; font-size: 11px; }
  .t3table th { color: var(--text3); font-weight: 500; font-size: 10px; padding: 3px 5px; text-align: right; border-bottom: 1px solid var(--border); }
  .t3table th:first-child, .t3table td:first-child { text-align: left; }
  .t3table td { padding: 4px 5px; border-top: 1px solid var(--border); color: var(--text); text-align: right; }
  .t3table tr.q3 td { background: var(--green-bg); color: var(--green-text); }
  .t3table tr.nq3 td { color: var(--text2); }

  /* SPINNER */
  .spinner-wrap { display: flex; align-items: center; justify-content: center; padding: 60px; }
  .spinner { width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--text2); border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ERROR */
  .err-box { padding: 20px; background: var(--bg2); border-radius: var(--radius); text-align: center; color: var(--text2); font-size: 13px; }
  .err-box b { color: var(--text); }

  /* RESPONSIVE */
  @media (max-width: 600px) {
    .hdr h1 { font-size: 15px; }
    .tab { padding: 6px 10px; font-size: 12px; }
    .bseed { display: none; }
  }
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-left">
    <span style="font-size:22px">⚽</span>
    <h1>FIFA World Cup 2026 — Live Dashboard</h1>
  </div>
  <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
    <span id="statusBadge" class="badge badge-loading">Loading…</span>
    <span id="lastUpdated" class="last-updated"></span>
    <button onclick="loadData()" style="font-size:11px;padding:3px 10px;border:1px solid var(--border);border-radius:999px;background:var(--bg);color:var(--text2);cursor:pointer;">↻ Refresh</button>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="showTab('standings',this)">Group Standings</button>
  <button class="tab" onclick="showTab('bracket',this)">Projected Bracket</button>
  <button class="tab" onclick="showTab('thirds',this)">Best 3rd Place</button>
</div>

<div id="standings" class="section active">
  <div class="legend">
    <div class="leg-item"><div class="leg-sq" style="background:var(--green-bg);border:1px solid var(--green-text)"></div>Qualifies (1st/2nd)</div>
    <div class="leg-item"><div class="leg-sq" style="background:var(--yellow-bg);border:1px solid var(--yellow-text)"></div>In contention (best 3rd)</div>
  </div>
  <div id="groupsGrid" class="groups-grid">
    <div class="spinner-wrap"><div class="spinner"></div></div>
  </div>
  <div id="standingsNote" class="note" style="display:none"></div>
</div>

<div id="bracket" class="section">
  <div id="bracketNote" class="note" style="margin-bottom:10px;display:none"></div>
  <div class="bwrap"><div id="bracketRoot" class="bracket-inner"></div></div>
</div>

<div id="thirds" class="section">
  <div id="thirdsNote" class="note" style="margin-bottom:10px;display:none"></div>
  <div id="thirdsTable"></div>
</div>

// ─── GROUP LETTER MAPPING FROM ESPN ─────────────────────────────────────────
// ESPN uses group names like "Group A", "Group B" etc. We map to our single letters.
const GROUP_ORDER = ['A','B','C','D','E','F','G','H','I','J','K','L'];

// ─── STATE ────────────────────────────────────────────────────────────────────
let GROUPS = []; // [{name, teams:[{name,flag,mp,w,d,l,gf,ga,pts}]}]

// ─── ESPN API ─────────────────────────────────────────────────────────────────
// Primary: ESPN v2 standings. Fallback: scoreboard for results.
const ESPN_STANDINGS = 'https://site.api.espn.com/apis/v2/sports/soccer/fifa.world/standings';
const ESPN_SCOREBOARD = 'https://site.api.espn.com/apis/v2/sports/soccer/fifa.world/scoreboard';
// CORS proxy for when direct calls fail (allorigins is free/public)
function proxied(url) { return `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`; }

async function fetchJSON(url) {
  // Try direct first, then proxied
  try {
    const r = await fetch(url, { cache: 'no-store' });
    if (!r.ok) throw new Error(r.status);
    return await r.json();
  } catch(e) {
    const r = await fetch(proxied(url), { cache: 'no-store' });
    if (!r.ok) throw new Error(r.status);
    const wrapper = await r.json();
    return JSON.parse(wrapper.contents);
  }
}

function parseESPN(data) {
  // ESPN standings response has data.children[] = conferences/groups
  const groups = [];
  const children = data?.children || data?.standings?.groups || [];
  for (const child of children) {
    const name = child.name || child.abbreviation || '';
    const letter = name.replace(/[^A-L]/gi,'').toUpperCase().slice(-1);
    if (!letter) continue;
    const standings = child.standings?.entries || child.entries || [];
    const teams = standings.map(entry => {
      const team = entry.team;
      const stats = {};
      (entry.stats || []).forEach(s => { stats[s.abbreviation || s.name] = s.value; });
      return {
        name: team?.displayName || team?.name || '?',
        flag: team?.flag?.href || team?.logos?.[0]?.href || '',
        abbr: team?.abbreviation || '',
        mp:  Math.round(stats['GP']  ?? stats['MP']  ?? stats['gp'] ?? 0),
        w:   Math.round(stats['W']   ?? stats['w']  ?? 0),
        d:   Math.round(stats['D']   ?? stats['d']  ?? 0),
        l:   Math.round(stats['L']   ?? stats['l']  ?? 0),
        gf:  Math.round(stats["F"] ?? 0),
        ga:  Math.round(stats["A"] ?? 0),
        pts: Math.round(stats["P"] ?? 0),
      };
    });
    if (teams.length > 0) groups.push({ name: letter, teams });
  }
  // Sort groups A–L
  groups.sort((a,b) => a.name.localeCompare(b.name));
  return groups;
}

// ─── TIEBREAKERS ──────────────────────────────────────────────────────────────
function gd(t) { return t.gf - t.ga; }

function sortTeams(teams) {
  return [...teams].sort((a,b) => {
    if (b.pts !== a.pts) return b.pts - a.pts;
    if (gd(b) !== gd(a)) return gd(b) - gd(a);
    if (b.gf !== a.gf) return b.gf - a.gf;
    return fifarank(a.name) - fifarank(b.name);
  });
}

function getThirds() {
  return GROUPS.map(g => {
    const s = sortTeams(g.teams);
    const t = s[2]; if (!t) return null;
    return { ...t, group: g.name, gd: gd(t), fifaR: fifarank(t.name) };
  }).filter(Boolean).sort((a,b) => {
    if (b.pts !== a.pts) return b.pts - a.pts;
    if (b.gd !== a.gd) return b.gd - a.gd;
    if (b.gf !== a.gf) return b.gf - a.gf;
    return a.fifaR - b.fifaR;
  });
}

function findComboRow(groups8) {
  const key = [...groups8].sort().join('');
  for (let i = 0; i < ANNEXE_C.length; i++) {
    if ([...ANNEXE_C[i]].sort().join('') === key) return i;
  }
  return -1;
}

// slot→column index in Annexe C: [1A=0, 1B=1, 1D=2, 1E=3, 1G=4, 1I=5, 1K=6, 1L=7]
// Matches: M79=1A, M85=1B, M81=1D, M74=1E, M82=1G, M77=1I, M87=1K, M80=1L
const SLOT_COL = { M79:0, M85:1, M81:2, M74:3, M82:4, M77:5, M87:6, M80:7 };

function get3rdForSlot(slot, row) {
  if (!row) return { name:'Best 3rd', flag:'', seed:`3rd place` };
  const grp = row[SLOT_COL[slot]];
  const t = getThirds().find(x => x.group === grp);
  if (!t) return { name:`3rd Grp ${grp}`, flag:'', seed:`3rd Grp ${grp}` };
  return { name: t.name, flag: t.flag, seed: `3rd Grp ${grp}` };
}

// ─── RENDER STANDINGS ─────────────────────────────────────────────────────────
function renderGroups() {
  const grid = document.getElementById('groupsGrid');
  if (GROUPS.length === 0) {
    grid.innerHTML = '<div class="err-box"><b>No standings data.</b><br>Try refreshing.</div>';
    return;
  }
  grid.innerHTML = '';
  const today = new Date().toLocaleDateString('en-US',{month:'short',day:'numeric'});
  GROUPS.forEach(g => {
    const sorted = sortTeams(g.teams);
    const allZero = sorted.every(t => t.mp === 0);
    const card = document.createElement('div'); card.className = 'gcard';
    const rows = sorted.map((t,i) => {
      let cls = '';
      if (!allZero) { if (i<2) cls='adv'; else if (i===2) cls='maybe'; }
      const d = gd(t); const ds = (d>=0?'+':'')+d;
      const flagEl = t.flag ? `<img class="flag-img" src="${t.flag}" onerror="this.style.display='none'" alt="">` : '';
      return `<tr class="${cls}"><td><div class="team-cell">${flagEl}<span>${t.name}</span></div></td><td>${t.mp}</td><td>${t.w}</td><td>${t.d}</td><td>${t.l}</td><td>${t.gf}</td><td>${t.ga}</td><td>${ds}</td><td class="pts">${t.pts}</td></tr>`;
    }).join('');
    card.innerHTML = `<h3>Group ${g.name}</h3>
    <table class="gtable">
      <thead><tr><th>Team</th><th>MP</th><th>W</th><th>D</th><th>L</th><th>GF</th><th>GA</th><th>GD</th><th>Pts</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
    grid.appendChild(card);
  });
  const note = document.getElementById('standingsNote');
  note.textContent = `Live data from ESPN. Tiebreaker order: pts → GD → GF → FIFA ranking. Last refreshed ${new Date().toLocaleTimeString()}.`;
  note.style.display = '';
}

// ─── RENDER THIRDS ────────────────────────────────────────────────────────────
function renderThirds() {
  const thirds = getThirds();
  const top8 = thirds.slice(0,8).map(t=>t.group);
  const comboIdx = findComboRow(top8);

  const container = document.getElementById('thirdsTable');
  const tbl = document.createElement('table'); tbl.className = 't3table';
  tbl.innerHTML = `<thead><tr><th>Rank</th><th>Team</th><th>Grp</th><th>MP</th><th>W</th><th>D</th><th>L</th><th>GF</th><th>GA</th><th>GD</th><th>Pts</th><th>FIFA</th></tr></thead>`;
  const tbody = document.createElement('tbody');
  thirds.forEach((t,i) => {
    const adv = i<8; const tr = document.createElement('tr'); tr.className = adv?'q3':'nq3';
    const d = t.gd>=0?`+${t.gd}`:String(t.gd);
    const flagEl = t.flag ? `<img class="flag-img" src="${t.flag}" onerror="this.style.display='none'" alt=""> ` : '';
    tr.innerHTML = `<td>${i+1}${adv?' ✓':''}</td><td>${flagEl}${t.name}</td><td>${t.group}</td><td>${t.mp}</td><td>${t.w}</td><td>${t.d}</td><td>${t.l}</td><td>${t.gf}</td><td>${t.ga}</td><td>${d}</td><td class="pts">${t.pts}</td><td>${t.fifaR}</td>`;
    tbody.appendChild(tr);
  });
  tbl.appendChild(tbody);
  container.innerHTML = '';
  container.appendChild(tbl);

  const note = document.getElementById('thirdsNote');
  note.textContent = `Top-8 3rd-place groups projected: ${top8.join(', ')}. Annexe C row: ${comboIdx>=0?comboIdx+1:'TBD — group stage not settled'}. Ranked by pts→GD→GF→FIFA ranking. Top 8 advance to R32.`;
  note.style.display = '';
}

// ─── BRACKET HELPERS ─────────────────────────────────────────────────────────
function getTeam(group, pos) {
  const g = GROUPS.find(x => x.name === group);
  if (!g) return { name:'TBD', flag:'', seed:'' };
  const s = sortTeams(g.teams); const t = s[pos];
  if (!t) return { name:'TBD', flag:'', seed:'' };
  const ord = ['1st','2nd','3rd'][pos];
  return { name: t.name, flag: t.flag, seed: `${ord} Grp ${group}` };
}

function makeMatchEl(top, bot, date, matchId, small) {
  const sz = small ? '9.5px' : '10.5px';
  const row = t => {
    const dim = !t.flag && t.name==='TBD';
    const flagEl = t.flag ? `<img class="flag-img" src="${t.flag}" onerror="this.style.display='none'" alt="">` : '';
    return `<div class="team-row${dim?' dimmed':''}">
      ${flagEl}
      <span class="bname" style="font-size:${sz}">${t.name}</span>
      ${t.seed?`<span class="bseed">${t.seed}</span>`:''}
    </div>`;
  };
  const d = document.createElement('div'); d.className = 'match-slot';
  d.innerHTML = `<div class="match-date">${matchId?`<b>${matchId}</b> · `:''}${date}</div>${row(top)}${row(bot)}`;
  return d;
}

function makeRoundCol(matches, label, small) {
  const col = document.createElement('div'); col.className = 'rcol';
  const hdr = document.createElement('div'); hdr.className = 'rhdr'; hdr.textContent = label;
  col.appendChild(hdr);
  const body = document.createElement('div'); body.className = 'rbody';
  matches.forEach(m => body.appendChild(makeMatchEl(m.t, m.b, m.date, m.id, small)));
  col.appendChild(body); return col;
}

function makeConn(n) {
  const col = document.createElement('div'); col.className = 'conn';
  for (let i=0;i<n;i++) {
    const seg = document.createElement('div'); seg.className = 'conn-seg';
    seg.innerHTML = `<svg width="18" height="100%" viewBox="0 0 18 60" preserveAspectRatio="none" style="width:18px;height:100%;display:block"><polyline points="0,15 9,15 9,45 18,45" fill="none" stroke="var(--border2)" stroke-width="1.5"/></svg>`;
    col.appendChild(seg);
  }
  return col;
}

// ─── RENDER BRACKET ───────────────────────────────────────────────────────────
function renderBracket() {
  const thirds = getThirds();
  const top8 = thirds.slice(0,8).map(t=>t.group);
  const comboIdx = findComboRow(top8);
  const comboRow = comboIdx >= 0 ? ANNEXE_C[comboIdx] : null;

  const g3 = slot => get3rdForSlot(slot, comboRow);
  const tbd = { name:'TBD', flag:'', seed:'' };

  const r32L = [
    {id:'M74',date:'Jun 28', t:getTeam('E',0), b:g3('M74')},
    {id:'M77',date:'Jun 30', t:getTeam('I',0), b:g3('M77')},
    {id:'M73',date:'Jun 28', t:getTeam('A',1), b:getTeam('B',0)},
    {id:'M75',date:'Jun 29', t:getTeam('F',0), b:getTeam('C',1)},
    {id:'M83',date:'Jul 2',  t:getTeam('K',1), b:getTeam('L',1)},
    {id:'M84',date:'Jul 2',  t:getTeam('H',0), b:getTeam('J',1)},
    {id:'M81',date:'Jul 1',  t:getTeam('D',0), b:g3('M81')},
    {id:'M82',date:'Jul 1',  t:getTeam('G',0), b:g3('M82')},
  ];
  const r32R = [
    {id:'M76',date:'Jun 29', t:getTeam('C',0), b:getTeam('F',1)},
    {id:'M78',date:'Jun 30', t:getTeam('E',1), b:getTeam('I',1)},
    {id:'M79',date:'Jun 30', t:getTeam('A',0), b:g3('M79')},
    {id:'M80',date:'Jul 1',  t:getTeam('L',0), b:g3('M80')},
    {id:'M86',date:'Jul 3',  t:getTeam('J',0), b:getTeam('H',1)},
    {id:'M88',date:'Jul 3',  t:getTeam('D',1), b:getTeam('G',1)},
    {id:'M85',date:'Jul 2',  t:getTeam('B',0), b:g3('M85')},
    {id:'M87',date:'Jul 3',  t:getTeam('K',0), b:g3('M87')},
  ];
  const r16L = [{date:'Jul 4',t:tbd,b:tbd},{date:'Jul 4',t:tbd,b:tbd},{date:'Jul 5',t:tbd,b:tbd},{date:'Jul 5',t:tbd,b:tbd}];
  const r16R = [{date:'Jul 6',t:tbd,b:tbd},{date:'Jul 6',t:tbd,b:tbd},{date:'Jul 7',t:tbd,b:tbd},{date:'Jul 7',t:tbd,b:tbd}];
  const qfL  = [{date:'Jul 9',t:tbd,b:tbd},{date:'Jul 10',t:tbd,b:tbd}];
  const qfR  = [{date:'Jul 11',t:tbd,b:tbd},{date:'Jul 11',t:tbd,b:tbd}];
  const sfL  = [{date:'Jul 14',t:tbd,b:tbd}];
  const sfR  = [{date:'Jul 15',t:tbd,b:tbd}];

  const root = document.getElementById('bracketRoot');
  root.innerHTML = '';

  const left = document.createElement('div'); left.style.cssText='display:flex;gap:0;flex:1';
  left.appendChild(makeRoundCol(r32L,'Round of 32',false));
  left.appendChild(makeConn(4));
  left.appendChild(makeRoundCol(r16L,'Round of 16',true));
  left.appendChild(makeConn(2));
  left.appendChild(makeRoundCol(qfL,'Quarterfinals',true));
  left.appendChild(makeConn(1));
  left.appendChild(makeRoundCol(sfL,'Semifinal',true));
  const fi = document.createElement('div'); fi.className='fin-in'; fi.innerHTML='<div class="fin-in-seg"></div>'; left.appendChild(fi);

  const center = document.createElement('div'); center.className='final-col';
  const chdr = document.createElement('div'); chdr.className='rhdr'; chdr.style.width='100%'; chdr.textContent='Final — Jul 19';
  const trophy = document.createElement('div'); trophy.className='trophy'; trophy.textContent='🏆';
  const fm = makeMatchEl(tbd,tbd,'Jul 19','',false);
  const venue = document.createElement('div'); venue.className='final-venue'; venue.textContent='MetLife Stadium, NJ';
  center.appendChild(chdr); center.appendChild(trophy); center.appendChild(fm); center.appendChild(venue);

  const right = document.createElement('div'); right.style.cssText='display:flex;gap:0;flex:1;flex-direction:row-reverse';
  right.appendChild(makeRoundCol(r32R,'Round of 32',false));
  right.appendChild(makeConn(4));
  right.appendChild(makeRoundCol(r16R,'Round of 16',true));
  right.appendChild(makeConn(2));
  right.appendChild(makeRoundCol(qfR,'Quarterfinals',true));
  right.appendChild(makeConn(1));
  right.appendChild(makeRoundCol(sfR,'Semifinal',true));
  const fo = document.createElement('div'); fo.className='fin-out'; fo.innerHTML='<div class="fin-out-seg"></div>'; right.appendChild(fo);

  root.appendChild(left); root.appendChild(center); root.appendChild(right);

  const note = document.getElementById('bracketNote');
  note.textContent = `Official FIFA R32 structure (Art. 12.6). 3rd-place slots resolved via Annexe C${comboIdx>=0?' row '+(comboIdx+1):' (pending final group standings)'}. Later rounds TBD.`;
  note.style.display = '';
}

// ─── MAIN LOAD ────────────────────────────────────────────────────────────────
async function loadData() {
  const badge = document.getElementById('statusBadge');
  const lastUpdated = document.getElementById('lastUpdated');
  badge.className = 'badge badge-loading'; badge.textContent = 'Loading…';

  try {
    const data = await fetchJSON(ESPN_STANDINGS);
    const parsed = parseESPN(data);

    if (parsed.length === 0) throw new Error('Empty standings');

    GROUPS = parsed;
    renderGroups();
    renderThirds();
    renderBracket();

    badge.className = 'badge badge-live'; badge.innerHTML = '<span class="live-dot"></span>Live';
    lastUpdated.textContent = `Updated ${new Date().toLocaleTimeString()}`;
  } catch(err) {
    console.error('Load error:', err);
    badge.className = 'badge badge-err'; badge.textContent = '⚠ Data error';
    lastUpdated.textContent = 'Could not load — try refreshing';
    document.getElementById('groupsGrid').innerHTML = `<div class="err-box" style="grid-column:1/-1"><b>Could not load live standings.</b><br>Check your internet connection and try the Refresh button. Error: ${err.message}</div>`;
  }
}

function showTab(id, btn) {
  document.querySelectorAll('.section').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
}

// Auto-refresh every 3 minutes
loadData();
setInterval(loadData, 3 * 60 * 1000);
</script>
